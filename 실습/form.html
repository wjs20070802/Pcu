<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <form action ="#">
            이름 : <input type="text"
            placeholder = "여기는 이름을 입력하세요."><br>
            전화번호 : <input type="text"><br>
            비밀번호 : <input type="password"><br>
            자기소개 : <textarea cols="30" rows="20"></textarea><br>
            출신지 : <input type="text" list="city">

            <datalist id="city">
                <option value="대전"></option>
                <option value="서울"></option>
            </datalist><br>

            <button type="button"img src=""></button>
            <input type="checkbox" value="1"> 짜장면
            <input type="checkbox" value="2"> 짬뽕
            <input type="checkbox" value="3" checked> 탕수육<br>

            <label><input type="radio" name="food" value="1"> 짜장면 </label>
            <input type="radio" name="food" value="2"> 짬뽕
            <input type="radio" name="food" value="3" checked> 탕수육<br>

            <select name="china">
                <option value="1"> 짜장면</option>
                <option value="2"> 짬뽕</option>
                <option value="3" selected> 탕수육</option>
            </select><br>

            <input type="color" value="#ff0000"
            onchange="document.body.style.color= this.value"><br>
            <input type="date" value="2007-01-01"><br>
            <input type="time" value="00:00"><br>

            <input type="number" min="0" max="100" step="0.5"><br>
            <input type="range" list="temp" min="0" max="100"> 100
            <datalist id="temp">
                <option value="10" label="Low"></option>
                <option value="50" label="Medium"></option>
                <option value="90" label="High"></option>
            </datalist><br>
            <input type="submit" value="제출">
        </form>
    </body>
</html>
